# ==========================
# 🏗️ Build Settings
# ==========================
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# ==========================
# 🔒 Private-preview password gate (temporary)
# Locks the whole site behind SITE_LOCK_PASSWORD. Serverless functions are
# excluded so Stripe's webhook (no credentials) still works. Remove this block
# (or unset SITE_LOCK_PASSWORD) + redeploy to make the site public again.
# ==========================
[[edge_functions]]
  path = "/*"
  function = "gate"
  # /privacy.html and /eula.html stay public (App Store / Play require reachable
  # policy links); serverless functions stay reachable for Stripe's webhook.
  excludedPath = ["/.netlify/functions/*", "/privacy.html", "/eula.html"]

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# ==========================
# 🧠 Local Dev (Netlify Dev)
# ==========================
[dev]
  command = "npm run dev"      # starts Vite
  port = 8888                  # Netlify proxy server (open this in browser)
  targetPort = 5173            # Vite's native port
  functionsPort = 9999         # Functions (optional)
  framework = "vite"
# ==========================
# 🌐 Redirects for SPA Routing
# ==========================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200